SETUP__:
  description: PK Dataset
  extend_file: pk-extend.yml
  flags:
    contcov:
    - AGE
    - WT
    - ALB
    - EGFR
    catcov:
    - SEX
    - CP
    - RF
    diagContCov:
    - AGE
    - WT
    - ALB
    - EGFR
    diagCatCov:
    - RF
    - CP
C:
  short: Commented rows
  type: character
  values:
  - '.'
  - C
  decode:
  - Not a comment
  - Comment for exclusion
NUM:
  short: Row number
  type: numeric
ID:
  short: NONMEM ID number
  type: numeric
TIME:
  short: Time after first dose
  type: numeric
  unit: hour
SEQ:
  short: Data type
  type: numeric
  values:
  - 0
  - 1
  decode:
  - Dose
  - Observation
CMT:
  short: Compartment
  type: numeric
  values:
  - 1
  - 2
  decode:
  - Dose
  - Observation
EVID:
  short: Event identifier
  type: numeric
  values:
  - 0
  - 1
  decode:
  - Observation event
  - Dosing event
AMT:
  short: Dose amount
  type: numeric
  unit: mg
DV:
  short: Concentration
  type: numeric
  unit: ng/mL
AGE:
  short: Age
  type: numeric
  unit: years
WT:
  short: Weight
  type: numeric
  unit: kg
HT:
  short: Height
  type: numeric
  unit: cm
EGFR:
  short: Estimated GFR
  type: numeric
  unit: mL/min/1.73m2
ALB:
  short: Albumin
  type: numeric
  unit: g/dL
BMI:
  short: Body mass index
  type: numeric
  unit: kg/m2
SEX:
  short: Sex
  type: numeric
  values:
  - 0
  - 1
  decode:
  - Male
  - Female
AAG:
  short: Alpha-1-acid glycoprotein
  type: numeric
  unit: mg/dL
SCR:
  short: Serum creatinine
  type: numeric
  unit: mg/dL
AST:
  short: Aspartate aminotransferase
  type: numeric
  unit: U/L
ALT:
  short: Alanine aminotransferase
  type: numeric
  unit: U/L
CP:
  short: Child-Pugh score
  type: numeric
  values:
  - 0
  - 1
  - 2
  - 3
  decode:
  - Normal
  - Score=1
  - Score=2
  - Score=3
TAFD:
  short: Time after first dose
  type: numeric
  unit: hour
TAD:
  short: Time since last dose
  type: numeric
  unit: hour
LDOS:
  short: Last dose amount
  type: numeric
  unit: mg
MDV:
  short: Missing dependent variable
  type: numeric
  values:
  - 0
  - 1
  decode:
  - 'No'
  - 'Yes'
BLQ:
  short: Below limit of quantification
  type: numeric
  values:
  - 1
  - 0
  decode:
  - Above QL
  - Below QL
PHASE:
  short: Study phase indicator
  type: numeric
STUDYN:
  short: Study number
  type: numeric
DOSE:
  short: Dose
  type: numeric
  unit: mg
  values:
  - 5
  - 10
  - 25
  - 50
  - 75
  - 100
  - 150
  - 200
  decode:
  - 5 mg
  - 10 mg
  - 25 mg
  - 50 mg
  - 75 mg
  - 100 mg
  - 150 mg
  - 200 mg
SUBJ:
  short: Subject identifier
  type: character
USUBJID:
  short: Unique subject identifier
  type: character
STUDY:
  short: Study name
  type: character
  values:
  - 101-DEMO-001
  - 101-DEMO-002
  - 201-DEMO-003
  - 201-DEMO-004
  decode:
  - 101-DEMO-001
  - 101-DEMO-002
  - 201-DEMO-003
  - 201-DEMO-004
ACTARM:
  short: Treatment arm
  type: character
  values:
  - DEMO 5 mg
  - DEMO 10 mg
  - DEMO 10 mg qd x7
  - DEMO 25 mg
  - DEMO 25 mg qd x7
  - DEMO 50 mg qd x7
  - DEMO 75 mg qd x7
  - DEMO 100 mg
  - DEMO 100 mg qd x7
  - DEMO 150 mg
  - DEMO 200 mg
  decode:
  - DEMO 5 mg
  - DEMO 10 mg
  - DEMO 10 mg qd x7
  - DEMO 25 mg
  - DEMO 25 mg qd x7
  - DEMO 50 mg qd x7
  - DEMO 75 mg qd x7
  - DEMO 100 mg
  - DEMO 100 mg qd x7
  - DEMO 150 mg
  - DEMO 200 mg
RF:
  short: Renal function
  type: character
  values:
  - norm
  - mild
  - mod
  - sev
  decode:
  - Normal
  - Mild
  - Moderate
  - Severe
